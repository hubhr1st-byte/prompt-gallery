<style>
  :root{
    --orange:#FA4B1E; --orange-deep:#D83A12; --orange-soft:#FCE3D8;
    --ink:#16130F; --muted:#8E8A85; --gray:#EAE8E5; --gray2:#F2F0ED;
    --line:#E6E3DE; --key-bg:#FBE6C8;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  ::selection{background:var(--orange);color:#fff}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes popin{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}

  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#E4DFD7;padding:24px}

  .statusbar{flex:none;display:flex;justify-content:space-between;align-items:center;padding:16px 28px 6px}
  .statusbar .clk{font-size:14px;font-weight:700;letter-spacing:-.01em}
  .bars{display:flex;align-items:flex-end;gap:2px;height:11px}
  .bars span{width:3px;border-radius:1px;background:currentColor}
  .batt{width:22px;height:11px;border:1.4px solid currentColor;border-radius:3px;padding:1.5px;display:flex}
  .batt i{flex:1;background:currentColor;border-radius:1px}

  .content{flex:1;overflow-y:auto;padding:8px 24px 8px}
  .content::-webkit-scrollbar{display:none}
  .approw{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
  .appname{font-weight:800;font-size:23px;letter-spacing:-.03em}

  .h2{font-weight:900;font-size:30px;line-height:1;letter-spacing:-.045em;margin:22px 0 0}
  .sub{font-size:13px;color:var(--muted);line-height:1.6}

  .chips{display:flex;gap:8px;overflow-x:auto;margin:16px 0 18px;cursor:grab;user-select:none}

  .cat{font-size:12px;font-weight:700;padding:6px 11px;border-radius:999px;background:var(--orange-soft);color:var(--orange-deep)}

  .ba .a .lab{color:var(--orange-deep)}.ba .a .v{font-size:11.5px;color:var(--ink);line-height:1.4}
  .key{background:var(--key-bg);border-radius:14px;padding:13px 15px}

  .sectit{font-weight:800;font-size:15px;letter-spacing:-.02em;margin:24px 0 12px}
  .myactions{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .tagmini{margin-right:auto;font-size:11px;color:#B9B4AC}
  .minibtn{border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit;font-size:12px;font-weight:600;padding:7px 14px;border-radius:999px;cursor:pointer}
  .minibtn.danger{color:var(--orange-deep);border-color:#F3CFC0}

  .splash{position:absolute;inset:0;background:var(--ink);overflow:hidden}
  .ghost{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .ghost span{font-weight:900;font-size:210px;letter-spacing:-.06em;color:rgba(255,255,255,.05);line-height:.8}
  .splashc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:0 40px}
  .stitle{font-weight:900;font-size:46px;line-height:.98;letter-spacing:-.045em;color:#fff;text-align:center}
  .loader{position:absolute;left:40px;right:40px;bottom:54px}
  .lbar{height:4px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}
  .lbar>i{position:relative;display:block;height:100%;width:0;background:var(--orange);border-radius:999px;overflow:hidden;transition:width .1s linear}
  .lbar>i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:shimmer 1.4s linear infinite}
  .lrow{display:flex;align-items:baseline;justify-content:space-between;margin-top:14px}
  .lrow .l{font-size:13px;color:var(--muted)}
  .pct{font-weight:200;font-size:30px;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
  .pct b{font-size:15px;color:var(--muted);font-weight:200}

  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:999px;white-space:nowrap;z-index:50;box-shadow:0 8px 20px rgba(0,0,0,.25);animation:popin .2s ease}

  /* ── 모바일(좁은 화면)에서는 가짜 폰 테두리·상태바를 없애고 화면을 꽉 채움 ── */
  @media (max-width:480px){
    .wrap{display:block;padding:0;min-height:100vh;min-height:100dvh;background:#fff}
    .phone{display:block;width:100%;background:none;padding:0;border-radius:0;box-shadow:none}
    .screen{width:100%;height:100vh;height:100dvh;max-width:none;max-height:none;border-radius:0}
    .notch{display:none}
    .statusbar{display:none}
    .content{padding-top:calc(8px + env(safe-area-inset-top))}
    .tabbar{margin-bottom:calc(16px + env(safe-area-inset-bottom))}
  }
</style>
</head>

function safeParse(s){ try{ return JSON.parse(s); }catch(e){ return null; } }

function weekStart(){ const d=new Date(); const day=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-day); return d.getTime(); }

  "발표·PPT":["슬라이드","ppt","발표","장표","피칭","피치"],

function heuristic(sit, pr){
  const low = (sit+" "+pr).toLowerCase();
  let cat = "기타";
  for(const c of Object.keys(KW)){ if(KW[c].some(k=>low.includes(k))){ cat=c; break; } }
  const num = pr.match(/(\d+)\s*(줄|개|장|단계|문장|쪽|페이지)/);
  const hasTable = /표|테이블|칼럼|컬럼|열|행/.test(pr);
  const hasCompare = /비교|대비|전후|차이|vs/.test(pr);
  const hasStruct = /목차|구조|틀|순서|→|->|\//.test(pr);
  const hasSummary = /요약|핵심|간단|추려|정리/.test(pr);
  const hasDesign = /디자인|스타일|모던|미니멀|미래지향|세련|비주얼|색상|컬러|아이콘|레이아웃|폰트|서체|톤앤매너|분위기|그래픽|템플릿|배색|포인트\s*컬러|꾸며/.test(pr);
  const hasEmail = /이메일|메일|회신|답장|공문|안내문/.test(pr);
  const hasTranslate = /번역|영문|영어로|영작|한글로|일본어|중국어|translate/i.test(pr);
  const hasTone = /말투|톤|어조|정중|공손|격식|부드럽게|완곡|딱딱|예의|순화/.test(pr);
  const hasReview = /검토|교정|첨삭|윤문|맞춤법|오탈자|오타|비문|검수|교열/.test(pr);

  const hasAnalysis = /분석|추세|증감|추이|비율|원인|패턴|인사이트/.test(pr);
  const hasIdeas = /아이디어|브레인스토밍|발상|아이디에이션/.test(pr);

  const hasMinutes = /회의록|회의\s*메모|미팅\s*노트|논의\s*내용|회의\s*내용/.test(pr);
  const hasCalendar = /캘린더|달력|일정표/.test(pr);
  const hasCode = /코드|코딩|엑셀|수식|함수|매크로|파이썬|자바스크립트|자바|sql|vlookup|피벗|스프레드시트|디버그/i.test(pr);
  const hasResearch = /리서치|조사|검색|자료\s*조사|시장\s*조사|동향|벤치마|출처|레퍼런스/.test(pr);

  return { category:cat, beforeAfter:{before,after}, tip, key };
}
async function classify(sit, pr){
  // 기본값: API 키 없이 동작하는 '규칙 기반' KEY 생성.
  // AI_ENDPOINT가 비어 있으면 곧장 규칙 기반 결과를 돌려줍니다. (지금 상태)
  // 나중에 진짜 Claude API용 백엔드를 만들면 AI_ENDPOINT만 채우면 됩니다.
  if(AI_ENDPOINT){
    try{
      const res = await fetch(AI_ENDPOINT, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ situation:sit, prompt:pr })
      });
      if(res.ok){
        const parsed = await res.json();
        if(parsed && CATS.includes(parsed.category)) return Object.assign(heuristic(sit,pr), parsed);
      }
    }catch(e){}
  }
  return heuristic(sit, pr);
}

function toast(msg){
  const sc = document.getElementById("screen");
  const old = sc.querySelector(".toast"); if(old) old.remove();
  const t = document.createElement("div"); t.className="toast"; t.textContent=msg; sc.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.remove(); }, 1800);
}

function cardHTML(c){
  const orange = state.cat!=="전체" && c.category===state.cat;
  const open = !!state.open[c.id];
  return '<div class="card'+(open?" open":"")+'" onclick="toggle(\''+c.id+'\')">'+
    '<div class="crow"><span class="cat'+(orange?"":" gray")+'">'+esc(c.category)+'</span>'+likeBtn(c,20)+'</div>'+
    '<div class="ctitlerow"><div class="ctitle">'+esc(c.situation)+'</div><span class="chev">'+(open?"▾":"▸")+'</span></div>'+
    (open ? detailsHTML(c)+'<div class="author">by '+esc(c.author)+'</div>' : "")+

function galleryHTML(){
  const cats = ["전체"].concat(CATS);
  const chips = cats.map(c=>{
    const on = state.cat===c;
    const cls = on ? (c==="전체"?"chip allon":"chip on") : "chip";
    return '<span class="'+cls+'" onclick="pick(\''+c+'\')">'+esc(c)+(c==="전체"&&on?" ↗":"")+'</span>';
  }).join("");
  const list = state.cat==="전체" ? state.cards : state.cards.filter(c=>c.category===state.cat);
  const body = list.length ? list.map(cardHTML).join("")
    : '<div class="empty">이 카테고리엔 아직 카드가 없어요.<br>첫 카드를 올려보세요.</div>';
  return appname()+'<div class="chips" id="chips">'+chips+'</div>'+body;
}

    '<div class="field"><div class="flabel">프롬프트</div>'+
    '<textarea class="ta" id="f_pr" rows="4" oninput="sync(\'prompt\',this.value)" placeholder="효과 봤던 프롬프트를 그대로 붙여넣어 주세요">'+esc(state.prompt)+'</textarea></div>'+
    '<div class="note"><span class="dot"></span><span class="x">회사·클라이언트명은 빼고 일반화해서 등록하세요.</span></div>'+
    '<div class="toggle" onclick="toggleAnon(this)"><div class="sw'+(state.anon?"":" off")+'"><i></i></div><span style="font-size:14px;font-weight:600">익명으로 등록</span></div>'+
    '<button class="cta" id="cta" onclick="doRegister()">등록하기</button>';
}

function bestHTML(){
  const ws = weekStart();
  let weekly = state.cards.filter(c=>c.createdAt>=ws).sort((a,b)=>b.likes-a.likes);
  const pool = weekly.length>=3 ? weekly : state.cards.slice().sort((a,b)=>b.likes-a.likes);
  const top = pool.slice(0,3);
  const rows = top.map((c,i)=>{
    const open = !!state.open[c.id];
    return '<div class="bestcard'+(i===0?" top":"")+(open?" open":"")+'" onclick="toggle(\''+c.id+'\')">'+
      '<span class="rank '+(i===0?"one":"other")+'">'+(i+1)+'</span>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="crow" style="margin-bottom:9px"><span class="cat'+(i===0?"":" gray")+'">'+esc(c.category)+'</span>'+likeBtn(c,18)+'</div>'+
        '<div class="btitlerow"><div class="btitle">'+esc(c.situation)+'</div><span class="chev">'+(open?"▾":"▸")+'</span></div>'+
        (open ? detailsHTML(c) : '<div class="bkey">'+esc(c.key)+'</div>')+
      '</div></div>';
  }).join("");
  return appname()+'<h2 class="h2">이번 주 베스트</h2><p class="sub" style="margin:4px 0 22px">좋아요가 가장 많은 KEY 카드 Top 3</p>'+rows;
}

function initials(name){ const n=(name||"").trim(); return n? n.slice(0,2) : "나"; }

function myCardHTML(c){
  const open = !!state.open[c.id];
  const anon = c.author==="익명";
  const confirming = state.confirmDel===c.id;
  return '<div class="card'+(open?" open":"")+'" onclick="toggle(\''+c.id+'\')">'+
    '<div class="crow"><span class="cat gray">'+esc(c.category)+'</span>'+likeBtn(c,20)+'</div>'+
    '<div class="ctitlerow"><div class="ctitle">'+esc(c.situation)+'</div><span class="chev">'+(open?"▾":"▸")+'</span></div>'+
    (open ? detailsHTML(c) : "")+
    '<div class="myactions">'+(anon?'<span class="tagmini">익명 등록</span>':'<span class="tagmini">'+esc(c.author)+'</span>')+
      '<button class="minibtn" onclick="event.stopPropagation();editCard(\''+c.id+'\')">수정</button>'+
      '<button class="minibtn danger" onclick="event.stopPropagation();delCard(\''+c.id+'\')">'+(confirming?"한 번 더 탭":"삭제")+'</button>'+
    '</div></div>';
}

function myHTML(){
  if(state.mySub==="editProfile") return profileEditHTML();
  if(state.mySub==="editCard") return cardEditHTML();
  const p = state.profile;
  const mineCards = state.mine.map(id=>state.cards.find(c=>c.id===id)).filter(Boolean);
  const likedCards = state.liked.map(id=>state.cards.find(c=>c.id===id)).filter(Boolean);
  let html = appname()+'<h2 class="h2" style="margin-top:18px">MY</h2>'+
    '<div class="profilecard">'+
      '<div class="avatar">'+esc(initials(p.name))+'</div>'+
      '<div style="flex:1;min-width:0"><div class="pname">'+esc(p.name)+'</div>'+
        '<div class="pbio">'+esc(p.bio)+'</div>'+
        '<div class="pstats">올린 프롬프트 '+mineCards.length+' · 좋아요 '+state.liked.length+'</div></div>'+
      '<button class="editp" onclick="editProfile()">수정</button>'+
    '</div>';
  html += '<div class="sectit">내가 올린 프롬프트 '+mineCards.length+'</div>';
  html += mineCards.length ? mineCards.map(myCardHTML).join("")
    : '<div class="empty">아직 올린 프롬프트가 없어요.<br>등록 탭에서 첫 카드를 올려보세요.</div>';
  html += '<div class="sectit">내가 좋아요한 프롬프트 '+state.liked.length+'</div>';
  html += likedCards.length ? likedCards.map(cardHTML).join("")
    : '<div class="empty">아직 좋아요한 카드가 없어요.</div>';
  return html;
}

function profileEditHTML(){
  const p = state.profile;
  return appname()+
    '<button class="ghostback" onclick="myBack()">‹ 뒤로</button>'+
    '<h2 class="h2" style="margin-top:10px">프로필 수정</h2>'+
    '<div class="field"><div class="flabel">이름</div>'+
    '<textarea class="ta" id="pf_name" rows="1">'+esc(p.name)+'</textarea></div>'+
    '<div class="field"><div class="flabel">한 줄 소개</div>'+
    '<textarea class="ta" id="pf_bio" rows="2">'+esc(p.bio)+'</textarea></div>'+
    '<button class="cta" onclick="saveProfile()">저장</button>';
}

function cardEditHTML(){
  const chips = CATS.map(c=>'<span class="chip'+(state.editCat===c?" on":"")+'" onclick="pickEdit(\''+c+'\')">'+esc(c)+'</span>').join("");
  return appname()+
    '<button class="ghostback" onclick="myBack()">‹ 뒤로</button>'+
    '<h2 class="h2" style="margin-top:10px">프롬프트 수정</h2>'+
    '<p class="sub" style="margin-top:12px;font-size:12px">내용을 고치면 AI가 KEY·해설을 다시 채워줘요.</p>'+
    '<div class="field"><div class="flabel">카테고리</div><div class="regchips">'+chips+'</div></div>'+
    '<div class="field"><div class="flabel">상황</div>'+
    '<textarea class="ta" id="ed_sit" rows="2" oninput="sync(\'editSit\',this.value)">'+esc(state.editSit)+'</textarea></div>'+
    '<div class="field"><div class="flabel">프롬프트</div>'+
    '<textarea class="ta" id="ed_pr" rows="4" oninput="sync(\'editPr\',this.value)">'+esc(state.editPr)+'</textarea></div>'+
    '<button class="cta" id="edcta" onclick="saveEdit()">저장</button>';
}

window.go = function(tab){ state.tab=tab; state.preview=null; state.mySub=null; state.confirmDel=null; render(); };
window.editProfile = function(){ state.mySub="editProfile"; render(); };
window.myBack = function(){ state.mySub=null; state.editId=null; state.confirmDel=null; render(); };
window.saveProfile = async function(){
  const name=(document.getElementById("pf_name").value||"").trim()||"나";
  const bio=(document.getElementById("pf_bio").value||"").trim();
  state.profile={name,bio}; state.mySub=null;
  lsSet(LS_PROFILE, JSON.stringify(state.profile));
  render(); toast("프로필을 저장했어요");
};
window.editCard = function(id){
  const c=state.cards.find(x=>x.id===id); if(!c) return;
  state.editId=id; state.editCat=c.category; state.editSit=c.situation; state.editPr=c.prompt; state.mySub="editCard"; state.confirmDel=null; render();
};
window.pickEdit = function(c){ state.editCat=c; render(); };
window.saveEdit = async function(){
  const sit=(document.getElementById("ed_sit").value||"").trim();
  const pr=(document.getElementById("ed_pr").value||"").trim();
  if(!sit||!pr){ toast("상황과 프롬프트를 모두 채워주세요"); return; }
  const btn=document.getElementById("edcta"); btn.disabled=true; btn.textContent="AI가 KEY 갱신 중…";
  const r = await classify(sit, pr); r.category = state.editCat;
  state.cards = state.cards.map(c=> c.id===state.editId ? Object.assign({},c,{category:r.category,situation:sit,prompt:pr,beforeAfter:r.beforeAfter,tip:r.tip,key:r.key}) : c);
  if(sb){ try{ await sb.from('cards').update({ category:r.category, situation:sit, prompt:pr, before_text:r.beforeAfter.before, after_text:r.beforeAfter.after, tip:r.tip, key_text:r.key }).eq('id', state.editId); }catch(e){} }
  state.mySub=null; state.editId=null;
  render(); toast("수정했어요");
};
window.delCard = async function(id){
  if(state.confirmDel!==id){ state.confirmDel=id; render(true); setTimeout(()=>{ if(state.confirmDel===id){ state.confirmDel=null; render(true); } },2600); return; }
  state.cards = state.cards.filter(c=>c.id!==id);
  state.mine = state.mine.filter(x=>x!==id);
  state.liked = state.liked.filter(x=>x!==id);
  delete state.open[id]; state.confirmDel=null;
  lsSet(LS_MINE, JSON.stringify(state.mine));
  if(sb){ try{ await sb.from('cards').delete().eq('id', id); }catch(e){} }
  render(); toast("삭제했어요");
};

function appname(){
  return '<div class="approw"><span class="appname">프롬프트 갤러리</span>'+
    '<button class="refresh" onclick="refresh()" aria-label="새로고침">↻</button></div>';
}

function tabbar(){
  const t=(k,l)=>'<div class="tab'+(state.tab===k?" on":"")+'" onclick="go(\''+k+'\')">'+l+'</div>';
  return '<div class="tabbar">'+t("register","등록")+t("gallery","갤러리")+t("best","베스트")+t("my","MY")+'</div>';
}

function loadingHTML(){
  return '<div class="splash">'+
    '<div class="ghost"><span>KEY</span></div>'+
    statusbar(true)+
    '<div class="splashc">'+
      '<svg width="142" viewBox="0 0 257 63" style="animation:floaty 3.4s ease-in-out infinite"><polygon points="150,0 257,0 241,31 131,31" fill="#fd5108"/><polygon points="18,32 128,32 110,63 0,63" fill="#fd5108"/></svg>'+
      '<div class="stitle">프롬프트<br>갤러리</div>'+
    '</div>'+
    '<div class="loader"><div class="lbar"><i id="lbar"></i></div>'+
      '<div class="lrow"><span class="l">디자인 토큰 불러오는 중…</span><span class="pct" id="lpct">0<b>%</b></span></div>'+
    '</div></div>';
}

function render(keepScroll){
  const sc = document.getElementById("screen");
  if(state.tab==="loading"){ sc.innerHTML = loadingHTML(); startLoader(); return; }
  let prev = 0;
  if(keepScroll){ const c0 = sc.querySelector(".content"); if(c0) prev = c0.scrollTop; }
  const chipsOld = sc.querySelector("#chips"); const chipsLeft = chipsOld ? chipsOld.scrollLeft : 0;
  let content;
  if(state.tab==="register") content = registerHTML();
  else if(state.tab==="best") content = bestHTML();
  else if(state.tab==="my") content = myHTML();
  else content = galleryHTML();
  sc.innerHTML = '<div class="notch"></div>'+statusbar(false)+'<div class="content" id="content">'+content+'</div>'+tabbar();
  if(keepScroll){ const c1 = sc.querySelector(".content"); if(c1) c1.scrollTop = prev; }
  const chipsNew = sc.querySelector("#chips"); if(chipsNew) chipsNew.scrollLeft = chipsLeft;
  attachChipDrag();
}

let dataReady = false;
function startLoader(){
  const bar = document.getElementById("lbar"), pct = document.getElementById("lpct");
  let v = 0;
  const iv = setInterval(()=>{
    v += Math.random()*9 + 4;
    if(v >= 100){ v = 100; }
    if(bar) bar.style.width = v+"%";
    if(pct) pct.innerHTML = Math.round(v)+'<b>%</b>';
    if(v >= 100){
      clearInterval(iv);
      const finish = ()=>{ state.tab="gallery"; render(); };
      if(dataReady) setTimeout(finish, 280); else { const w=setInterval(()=>{ if(dataReady){ clearInterval(w); finish(); } },80); }
    }
  }, 130);
}

function attachChipDrag(){
  const el = document.getElementById("chips"); if(!el) return;
  let down=false, sx=0, sl=0, moved=false;
  el.addEventListener("mousedown", e=>{ down=true; moved=false; sx=e.pageX; sl=el.scrollLeft; });
  window.addEventListener("mousemove", e=>{ if(!down) return; const dx=e.pageX-sx; if(Math.abs(dx)>3) moved=true; el.scrollLeft=sl-dx; });
  window.addEventListener("mouseup", ()=>{ down=false; });
  el.addEventListener("click", e=>{ if(moved){ e.preventDefault(); e.stopPropagation(); } }, true);
}

window.pick = function(cat){ state.cat=cat; render(true); };
window.sync = function(k,v){ state[k]=v; };
window.toggleAnon = function(el){ state.anon=!state.anon; const sw=el.querySelector(".sw"); sw.classList.toggle("off", !state.anon); };
function updateLikeDOM(id, pop){
  const card = state.cards.find(c=>c.id===id); if(!card) return;
  const liked = state.liked.includes(id);
  document.querySelectorAll('[data-like="'+id+'"]').forEach(btn=>{
    btn.classList.toggle("off", !liked);
    const n = btn.querySelector(".n"); if(n) n.textContent = card.likes;
    if(pop){ const hv = btn.querySelector(".hv"); if(hv){ hv.classList.remove("pop"); void hv.offsetWidth; hv.classList.add("pop"); setTimeout(()=>hv.classList.remove("pop"),420); } }
  });
}
window.like = async function(id){
  const isL = state.liked.includes(id);
  const becameLiked = !isL;
  state.cards = state.cards.map(c=> c.id===id ? Object.assign({},c,{likes:Math.max(0,c.likes+(isL?-1:1))}) : c);
  state.liked = isL ? state.liked.filter(x=>x!==id) : state.liked.concat(id);
  if(state.tab==="best"){ state.popId = becameLiked?id:null; render(true); state.popId=null; }
  else { updateLikeDOM(id, becameLiked); }
  // 좋아요 기록을 DB에 저장 → 좋아요 숫자는 DB가 자동으로 +1/-1 (모두에게 공유)
  if(sb){ try{
    if(becameLiked) await sb.from('card_likes').insert({ card_id:id, user_id:userId });
    else await sb.from('card_likes').delete().eq('card_id', id).eq('user_id', userId);
  }catch(e){} }
};
window.toggle = function(id){ state.open[id] = !state.open[id]; render(true); };
window.pickReg = function(c){ state.regCat = c; render(); };
window.doRegister = async function(){
  const sit = (document.getElementById("f_sit").value||"").trim();
  const pr = (document.getElementById("f_pr").value||"").trim();
  if(!sit || !pr){ toast("상황과 프롬프트를 모두 채워주세요"); return; }
  state.situation=sit; state.prompt=pr;
  const btn = document.getElementById("cta"); btn.disabled=true; btn.textContent="AI가 KEY 생성 중…";
  const r = await classify(sit, pr);
  r.category = state.regCat;
  state.preview = r;
  render();
};
window.savePreview = async function(){
  const p = state.preview;
  const id = "card_"+Date.now();
  const author = state.anon ? "익명" : (state.profile.name||"익명");
  const row = { id, category:p.category, situation:state.situation, prompt:state.prompt,
    before_text:p.beforeAfter.before, after_text:p.beforeAfter.after, tip:p.tip, key_text:p.key, author, likes:0 };
  const card = rowToCard(Object.assign({}, row, { created_at:new Date().toISOString() }));
  state.cards = [card].concat(state.cards);
  state.mine = [id].concat(state.mine);
  state.open[id] = true;
  lsSet(LS_MINE, JSON.stringify(state.mine));
  if(sb){ try{ await sb.from('cards').insert(row); }catch(e){} }
  state.situation=""; state.prompt=""; state.preview=null; state.tab="gallery"; state.cat="전체";
  render(); toast("갤러리에 카드를 올렸어요");
};
window.backPreview = function(){ state.preview=null; render(); };
window.refresh = async function(){
  await loadData();
  render(); toast("새로고침했어요");
};

async function loadData(){
  // 1) 모두가 공유하는 카드들을 DB에서 불러오기 (최신순)
  try{
    if(!sb) throw new Error("no-sb");
    const { data, error } = await sb.from('cards').select('*').order('created_at', { ascending:false });
    if(error) throw error;
    state.cards = (data && data.length) ? data.map(rowToCard) : SEEDS;
  }catch(e){ state.cards = SEEDS; }
  // 2) '이 브라우저가' 좋아요한 카드 목록을 DB에서 불러오기
  try{
    if(!sb) throw new Error("no-sb");
    const { data } = await sb.from('card_likes').select('card_id').eq('user_id', userId);
    state.liked = data ? data.map(x=>x.card_id) : [];
  }catch(e){ state.liked = []; }
  // 3) 내 글 목록·프로필은 이 브라우저(로컬)에만 저장
  state.mine = safeParse(lsGet(LS_MINE)) || [];
  const pf = safeParse(lsGet(LS_PROFILE));
  state.profile = pf || Object.assign({}, DEFAULT_PROFILE);
  dataReady = true;
}

render();
loadData();
</script>
</body>
</html>
